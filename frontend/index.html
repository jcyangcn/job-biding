<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Builder</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="page">
    <header>
      <h1>Resume Builder</h1>
      <p class="subtitle">Paste a job description, choose a profile, and generate a tailored PDF resume.</p>
    </header>

    <main>
      <section class="card">
        <label for="jd">Job description</label>
        <textarea id="jd" rows="14" placeholder="Paste the full job posting here…" required></textarea>
        <div class="row">
          <button type="button" id="load-jd" class="btn secondary">Load JD.md from repo</button>
        </div>
      </section>

      <section class="card">
        <span class="label">Profile source</span>
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" data-mode="markdown">Custom markdown</button>
          <button type="button" class="tab" data-mode="json">Custom JSON</button>
        </div>

        <div id="panel-markdown" class="panel">
          <label for="profile-md">Profile markdown</label>
          <textarea id="profile-md" rows="16" placeholder="Same format as profiles.md…"></textarea>
          <button type="button" id="load-profile-md" class="btn secondary">Load default template</button>
        </div>

        <div id="panel-json" class="panel hidden">
          <label for="profile-json">Profile JSON</label>
          <textarea id="profile-json" rows="16" placeholder='{ "name": "…", "experience": […] }'></textarea>
          <button type="button" id="load-profile-json" class="btn secondary">Load default as JSON</button>
        </div>
      </section>

      <section class="actions">
        <button type="button" id="generate" class="btn primary">Generate PDF resume</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
